		<script type="text/javascript">				
			function onLoad(){
				document.addEventListener("deviceready", onDeviceReady, false);
			}
			
			function onDeviceReady(){
				// Se puede usar el API de phonegap de manera segura
			}
			
			document.addEventListener("pause", onPause, false);
			
			function onPause(){
				// Se puede guardar el estado de la aplicación
			}
			
			document.addEventListener("backbutton", onBackKeyDown, false);
			
			function onBackKeyDown(e) {
				// Se puede manejar el boton de ir atrás
				e.preventDefault();
			}
			
			function salirDeLaAplicacion(){
				if (esDispositivoMovil){
					navigator.app.exitApp();
					return false;
				}
				// Caso PC. Se ha verificado que funciona con Chrome y Microsoft Edge.
				// Probablemente si esta aplicación consistiera en un sitio web en donde 
				// se navega entre varias páginas, habiendo un historial de navegación 
				// entre ellas, esto no funcionaría
				window.close();
				return false;
			}
		</script>
